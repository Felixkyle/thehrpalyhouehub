# Production stack for thehrplayhouseplay backend.
# Bring up with:  docker compose up -d --build
# All secrets come from a .env file in this directory (see .env.example).

services:
  mongo:
    # 4.4 is the last MongoDB that runs WITHOUT AVX CPU support.
    # The VPS CPU lacks AVX, so 5.0+ crashes with "Illegal instruction".
    image: mongo:4.4
    restart: unless-stopped
    # All config (incl. Mongo root creds) lives in backend/.env.
    env_file:
      - ./backend/.env
    volumes:
      - mongo-data:/data/db
    # Bound to loopback only — never exposed to the public internet.
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      # mongo:4.4 ships the legacy `mongo` shell (not `mongosh`).
      # Authenticate — root creds are set above, so an unauthenticated ping is rejected.
      test:
        [
          "CMD",
          "mongo",
          "--quiet",
          "-u", "${MONGO_INITDB_ROOT_USERNAME}",
          "-p", "${MONGO_INITDB_ROOT_PASSWORD}",
          "--authenticationDatabase", "admin",
          "--eval", "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    # All backend config + secrets live in backend/.env (one source of truth).
    env_file:
      - ./backend/.env
    volumes:
      - backend-uploads:/app/uploads
    # Published to the host loopback only. The VPS's own nginx/apache
    # reverse-proxies api.thehrplayhousehub.org -> http://127.0.0.1:4000.
    # Not exposed to the public internet directly.
    ports:
      - "127.0.0.1:4000:4000"

volumes:
  mongo-data:
  backend-uploads:
