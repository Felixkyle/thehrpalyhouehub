# Production stack for thehrplayhouseplay backend.
# Bring up with:  docker compose up -d --build
# All secrets come from a .env file in this directory (see .env.example).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    # Bound to loopback only — never exposed to the public internet.
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      # Authenticate — root creds are set above, so an unauthenticated ping is rejected.
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u", "${MONGO_INITDB_ROOT_USERNAME}",
          "-p", "${MONGO_INITDB_ROOT_PASSWORD}",
          "--authenticationDatabase", "admin",
          "--eval", "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      - backend-uploads:/app/uploads
    # Exposed only to nginx on the internal network; not published to host.
    expose:
      - "4000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro

volumes:
  mongo-data:
  backend-uploads:
