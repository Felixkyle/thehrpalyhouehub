# Reverse proxy for api.thehrplayhousehub.org -> backend:4000
#
# TLS certs are issued by certbot into ./nginx/certbot/conf (mounted at
# /etc/letsencrypt). See DEPLOY.md for the one-time issuance steps.

upstream backend_upstream {
    server backend:4000;
}

# ── HTTP: ACME challenge + redirect to HTTPS ───────────────────
server {
    listen 80;
    server_name api.thehrplayhousehub.org;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: proxy to backend ────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.thehrplayhousehub.org;

    ssl_certificate     /etc/letsencrypt/live/api.thehrplayhousehub.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thehrplayhousehub.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Allow large-ish JSON (AI chat sends base64 docs; app limit is 20mb)
    client_max_body_size 25m;

    gzip on;
    gzip_types application/json text/plain;

    location / {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
